<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Capitale" />
<meta name="theme-color" content="#0a0e1a" />
<title>Capitale — Educazione Finanziaria</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: #0a0e1a; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  body { min-height: 100vh; min-height: 100dvh; }
  * { -webkit-user-select: none; user-select: none; }
  @keyframes floatUp {
    0% { transform: translate(-50%, 0); opacity: 1; }
    100% { transform: translate(-50%, -80px); opacity: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// Inline SVG icons
const Icon = ({ d, className = "w-5 h-5", stroke = "currentColor" }) => (
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{d}</svg>
);
const ICONS = {
  TrendingUp: <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>,
  TrendingDown: <><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></>,
  Briefcase: <><rect width="20" height="14" x="2" y="7" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>,
  GraduationCap: <><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></>,
  Building2: <><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4M10 10h4M10 14h4M10 18h4"/></>,
  X: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
  Award: <><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></>,
  AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>,
  Sparkles: <><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/></>,
  Coins: <><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></>,
  BookOpen: <><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>,
};
const I = (name, props = {}) => <Icon d={ICONS[name]} {...props} />;

const fmt = (n) => {
  if (n >= 1e6) return '€' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '€' + (n/1e3).toFixed(1) + 'k';
  return '€' + n.toFixed(2);
};

const TUTORIALS = {
  start: { title: 'Benvenuto in Capitale', icon: 'Sparkles', body: 'Tocca per lavorare e guadagnare. Ma attenzione: i contanti perdono valore ogni giorno per l\'inflazione (~2%/anno). Per crescere davvero il patrimonio dovrai investire.' },
  inflation: { title: 'L\'inflazione morde', icon: 'AlertCircle', body: 'Hai notato? Tenere tutto in contanti significa perdere potere d\'acquisto. €100 oggi varranno ~€98 fra un anno. Per questo si investe.' },
  conto: { title: 'Conto deposito', icon: 'Coins', body: 'Rende poco (~1%/anno) ma è sicurissimo. Ottimo per il fondo d\'emergenza: i soldi che ti servono "subito" se succede qualcosa.' },
  btp: { title: 'BTP — Obbligazioni di Stato', icon: 'BookOpen', body: 'Presti soldi allo Stato italiano e ricevi interessi (~3,5%/anno). Rischio basso, rendimento moderato. Buon equilibrio.' },
  etf: { title: 'ETF azionari', icon: 'TrendingUp', body: 'Un paniere di azioni diversificato. In media ~7%/anno nel lungo periodo, ma volatile: può crollare del 30% in un anno cattivo. La pazienza è tutto.' },
  immobili: { title: 'Immobili', icon: 'Building2', body: 'Costo iniziale alto (€50k cad.) ma rendita passiva costante (~5%/anno di affitti). Poco liquido: non lo rivendi facilmente.' },
  studio: { title: 'Investi su te stesso', icon: 'GraduationCap', body: 'Il miglior investimento. Studiare aumenta quanto guadagni per ogni ora di lavoro. Rendimenti del capitale umano = i più alti in assoluto.' },
  compound: { title: 'Interesse composto', icon: 'Award', body: 'Einstein lo chiamava l\'ottava meraviglia del mondo. I tuoi guadagni generano altri guadagni. Più tempo passa, più la crescita accelera.' },
};

const EVENTS = [
  { id: 'crash', title: 'Crollo di mercato!', body: 'Gli ETF perdono il 25%. Chi vende ora, perde davvero. Chi resta, recupera nel tempo.', icon: 'TrendingDown', effect: (s) => ({ ...s, etf: s.etf * 0.75 }) },
  { id: 'bull', title: 'Mercato in rialzo', body: 'Ottimismo generale: ETF +15%. Ricorda però che la volatilità funziona in entrambe le direzioni.', icon: 'TrendingUp', effect: (s) => ({ ...s, etf: s.etf * 1.15 }) },
  { id: 'bonus', title: 'Tredicesima!', body: 'Un mese di stipendio extra. Cosa ne farai? Spenderlo è facile, investirlo lavora per te.', icon: 'Coins', effect: (s) => ({ ...s, cash: s.cash + s.tapValue * 200 }) },
  { id: 'spesa', title: 'Spesa imprevista', body: 'Caldaia rotta: -€500. Avere un fondo d\'emergenza evita di dover vendere investimenti nel momento sbagliato.', icon: 'AlertCircle', effect: (s) => ({ ...s, cash: Math.max(0, s.cash - 500) }) },
  { id: 'div', title: 'Dividendi BTP', body: 'Cedola staccata: +3% sui BTP. Le obbligazioni pagano periodicamente.', icon: 'Sparkles', effect: (s) => ({ ...s, btp: s.btp * 1.03 }) },
];

function CapitalGame() {
  const [cash, setCash] = useState(100);
  const [tapValue, setTapValue] = useState(1);
  const [day, setDay] = useState(1);
  const [tab, setTab] = useState('lavoro');
  const [floaters, setFloaters] = useState([]);
  const [modal, setModal] = useState({ type: 'tutorial', key: 'start' });
  const [seen, setSeen] = useState({});
  const [eventLog, setEventLog] = useState([]);
  const [conto, setConto] = useState(0);
  const [btp, setBtp] = useState(0);
  const [etf, setEtf] = useState(0);
  const [immobili, setImmobili] = useState(0);
  const [eduLevel, setEduLevel] = useState(0);
  const [marketTrend, setMarketTrend] = useState(1);

  const netWorth = cash + conto + btp + etf + immobili * 50000;
  const passiveDaily = (conto * 0.01 + btp * 0.035 + etf * 0.07 + immobili * 50000 * 0.05) / 365;

  const showTutorial = (key) => {
    if (!seen[key]) {
      setModal({ type: 'tutorial', key });
      setSeen(s => ({ ...s, [key]: true }));
    }
  };

  useEffect(() => {
    const id = setInterval(() => {
      setDay(d => d + 1);
      setConto(v => v * (1 + 0.01/365));
      setBtp(v => v * (1 + 0.035/365));
      setEtf(v => v * (1 + (0.07/365) * marketTrend));
      setCash(c => c * (1 - 0.02/365) + (immobili * 50000 * 0.05 / 365));
      setMarketTrend(t => Math.max(0.4, Math.min(1.6, t + (Math.random() - 0.5) * 0.08)));
      if (Math.random() < 0.012) {
        const ev = EVENTS[Math.floor(Math.random() * EVENTS.length)];
        setModal({ type: 'event', event: ev });
      }
    }, 1000);
    return () => clearInterval(id);
  }, [immobili, marketTrend]);

  useEffect(() => {
    if (day === 60) showTutorial('inflation');
    if (day === 180) showTutorial('compound');
  }, [day]);

  const handleTap = (e) => {
    setCash(c => c + tapValue);
    const id = Date.now() + Math.random();
    const rect = e.currentTarget.getBoundingClientRect();
    const touch = e.nativeEvent.touches ? e.nativeEvent.touches[0] : e.nativeEvent;
    const x = (touch.clientX || rect.width/2) - rect.left;
    const y = (touch.clientY || rect.height/2) - rect.top;
    setFloaters(f => [...f, { id, x, y, v: tapValue }]);
    setTimeout(() => setFloaters(f => f.filter(fl => fl.id !== id)), 900);
  };

  const buy = (setter, key) => (amt) => {
    if (cash >= amt) { setCash(c => c - amt); setter(v => v + amt); showTutorial(key); }
  };
  const sell = (which, amt) => {
    if (which === 'conto' && conto >= amt) { setConto(v => v - amt); setCash(c => c + amt); }
    if (which === 'btp' && btp >= amt) { setBtp(v => v - amt); setCash(c => c + amt); }
    if (which === 'etf' && etf >= amt) { setEtf(v => v - amt); setCash(c => c + amt); }
  };
  const buyImmobile = () => {
    if (cash >= 50000) { setCash(c => c - 50000); setImmobili(i => i + 1); showTutorial('immobili'); }
  };
  const studyCost = Math.floor(50 * Math.pow(2.2, eduLevel));
  const study = () => {
    if (cash >= studyCost) { setCash(c => c - studyCost); setEduLevel(l => l + 1); setTapValue(v => v * 1.5); showTutorial('studio'); }
  };

  const closeModal = () => {
    if (modal?.type === 'event') {
      const next = modal.event.effect({ cash, tapValue, etf, btp, conto });
      setCash(next.cash); setEtf(next.etf); setBtp(next.btp); setConto(next.conto);
      setEventLog(l => [{ ...modal.event, day }, ...l].slice(0, 6));
    }
    setModal(null);
  };

  return (
    <div className="w-full min-h-screen flex items-center justify-center p-2" style={{ background: 'radial-gradient(ellipse at top, #1a2332 0%, #0a0e1a 100%)' }}>
      <div className="w-full max-w-sm rounded-[2rem] overflow-hidden shadow-2xl relative" style={{ background: '#0d1117', minHeight: '780px', border: '1px solid #1f2937' }}>
        <div className="px-5 pt-4 pb-3">
          <div className="flex items-baseline justify-between">
            <h1 className="text-stone-100 tracking-tight" style={{ fontFamily: 'Georgia, serif', fontSize: '22px', fontWeight: 500 }}>
              Capitale<span className="text-amber-400">.</span>
            </h1>
            <span className="text-[10px] text-stone-500 font-mono uppercase tracking-wider">Giorno {day}</span>
          </div>
        </div>

        <div className="mx-4 mb-3 rounded-2xl p-4" style={{ background: 'linear-gradient(135deg, #1a2332 0%, #0f1722 100%)', border: '1px solid #1f2937' }}>
          <div className="text-[10px] text-stone-500 uppercase tracking-widest mb-1">Patrimonio netto</div>
          <div className="text-stone-100 text-3xl" style={{ fontFamily: 'Georgia, serif', fontWeight: 500 }}>{fmt(netWorth)}</div>
          <div className="flex items-center justify-between mt-2">
            <div className="text-[11px] text-stone-400">
              <span className="text-emerald-400">+{fmt(passiveDaily)}</span><span className="text-stone-500">/giorno passivo</span>
            </div>
            <div className="flex items-center gap-1 text-[10px]">
              <span className="text-stone-500">Mercato</span>
              {marketTrend >= 1 ? I('TrendingUp', { className: 'w-3 h-3 text-emerald-400' }) : I('TrendingDown', { className: 'w-3 h-3 text-rose-400' })}
            </div>
          </div>
        </div>

        <div className="mx-4 mb-3 flex justify-between items-center px-4 py-2 rounded-xl" style={{ background: '#111827' }}>
          <span className="text-[10px] uppercase tracking-widest text-stone-500">Liquidità</span>
          <span className="text-amber-400 font-mono text-sm">{fmt(cash)}</span>
        </div>

        <div className="px-4 pb-20" style={{ minHeight: '480px' }}>
          {tab === 'lavoro' && (
            <div className="flex flex-col items-center pt-2">
              <p className="text-[11px] text-stone-400 text-center mb-3 px-4">
                Tocca per lavorare. Ogni tap = <span className="text-amber-400">{fmt(tapValue)}</span>
              </p>
              <button
                onClick={handleTap}
                className="relative w-52 h-52 rounded-full select-none active:scale-95 transition-transform"
                style={{
                  background: 'radial-gradient(circle at 30% 30%, #fbbf24 0%, #d97706 60%, #92400e 100%)',
                  boxShadow: '0 20px 60px -10px rgba(251, 191, 36, 0.4), inset 0 -8px 20px rgba(0,0,0,0.3), inset 0 4px 12px rgba(255,255,255,0.2)',
                }}
              >
                <div className="absolute inset-0 flex items-center justify-center">
                  <span className="text-amber-100" style={{ fontFamily: 'Georgia, serif', fontSize: '64px', fontWeight: 500 }}>€</span>
                </div>
                {floaters.map(f => (
                  <span key={f.id} className="absolute pointer-events-none text-emerald-300 font-bold text-lg"
                    style={{ left: f.x, top: f.y, animation: 'floatUp 0.9s ease-out forwards' }}>
                    +{fmt(f.v)}
                  </span>
                ))}
              </button>
              <div className="mt-6 w-full space-y-2">
                <div className="text-[10px] uppercase tracking-widest text-stone-500 px-1">Cronologia eventi</div>
                {eventLog.length === 0 && <div className="text-[11px] text-stone-600 italic px-1">Nessun evento ancora...</div>}
                {eventLog.map((e, i) => (
                  <div key={i} className="text-[11px] text-stone-400 px-3 py-2 rounded-lg" style={{ background: '#111827' }}>
                    <span className="text-stone-500 font-mono">G{e.day}</span> · {e.title}
                  </div>
                ))}
              </div>
            </div>
          )}

          {tab === 'investi' && (
            <div className="space-y-3 pt-2">
              <InvestCard label="Conto Deposito" sub="~1% / anno · rischio nullo" color="sky" holding={conto} cash={cash} onBuy={buy(setConto, 'conto')} onSell={(a) => sell('conto', a)} />
              <InvestCard label="BTP" sub="~3,5% / anno · rischio basso" color="emerald" holding={btp} cash={cash} onBuy={buy(setBtp, 'btp')} onSell={(a) => sell('btp', a)} />
              <InvestCard label="ETF Azionari" sub="~7% / anno · volatile" color="amber" holding={etf} cash={cash} volatile={marketTrend} onBuy={buy(setEtf, 'etf')} onSell={(a) => sell('etf', a)} />
              <div className="rounded-xl p-4" style={{ background: '#111827', border: '1px solid #1f2937' }}>
                <div className="flex justify-between items-start mb-2">
                  <div>
                    <div className="text-stone-200 text-sm font-medium">Immobili</div>
                    <div className="text-[10px] text-stone-500">€50.000 cad. · rendita 5%/anno</div>
                  </div>
                  <div className="text-right">
                    <div className="text-xs text-stone-500">Possiedi</div>
                    <div className="text-stone-100 text-sm">{immobili}</div>
                  </div>
                </div>
                <button onClick={buyImmobile} disabled={cash < 50000} className="w-full py-2 rounded-lg text-xs font-medium disabled:opacity-30 transition-opacity"
                  style={{ background: cash >= 50000 ? '#7c2d12' : '#1f2937', color: cash >= 50000 ? '#fed7aa' : '#6b7280' }}>
                  Acquista immobile · €50.000
                </button>
              </div>
            </div>
          )}

          {tab === 'studio' && (
            <div className="space-y-3 pt-2">
              <div className="rounded-2xl p-5" style={{ background: 'linear-gradient(135deg, #1e1b4b 0%, #0f0d2e 100%)', border: '1px solid #312e81' }}>
                {I('GraduationCap', { className: 'w-6 h-6 text-violet-300 mb-2' })}
                <div className="text-stone-100 text-sm font-medium mb-1">Investi su te stesso</div>
                <div className="text-[11px] text-stone-400 mb-3 leading-relaxed">
                  Ogni livello aumenta del 50% quanto guadagni per ogni tap. Il capitale umano è l'asset più potente.
                </div>
                <div className="flex justify-between items-center text-[11px] text-stone-400 mb-2">
                  <span>Livello attuale</span><span className="text-violet-300 font-mono">{eduLevel}</span>
                </div>
                <div className="flex justify-between items-center text-[11px] text-stone-400 mb-3">
                  <span>Reddito attivo</span><span className="text-amber-400 font-mono">{fmt(tapValue)}/tap</span>
                </div>
                <button onClick={study} disabled={cash < studyCost} className="w-full py-2.5 rounded-lg text-xs font-medium disabled:opacity-30"
                  style={{ background: cash >= studyCost ? '#6d28d9' : '#1f2937', color: cash >= studyCost ? '#ede9fe' : '#6b7280' }}>
                  Studia · {fmt(studyCost)}
                </button>
              </div>
              <div className="rounded-xl p-4 text-[11px] text-stone-400 leading-relaxed" style={{ background: '#111827' }}>
                <div className="text-stone-300 mb-1 font-medium">💡 Concetti chiave</div>
                <ul className="space-y-1.5 mt-2">
                  <li>• <span className="text-stone-300">Diversifica</span>: non mettere tutto in un solo asset</li>
                  <li>• <span className="text-stone-300">Tempo &gt; tempistica</span>: il "quando" investi conta meno del "per quanto"</li>
                  <li>• <span className="text-stone-300">Fondo emergenza</span>: 3-6 mesi di spese in liquidità</li>
                  <li>• <span className="text-stone-300">Rischio = rendimento</span>: non c'è ritorno senza rischio</li>
                </ul>
              </div>
            </div>
          )}
        </div>

        <div className="absolute bottom-0 left-0 right-0 px-2 py-2 flex justify-around" style={{ background: '#0a0e1a', borderTop: '1px solid #1f2937', paddingBottom: 'max(8px, env(safe-area-inset-bottom))' }}>
          <NavBtn iconName="Briefcase" label="Lavoro" active={tab === 'lavoro'} onClick={() => setTab('lavoro')} />
          <NavBtn iconName="TrendingUp" label="Investi" active={tab === 'investi'} onClick={() => setTab('investi')} />
          <NavBtn iconName="GraduationCap" label="Studio" active={tab === 'studio'} onClick={() => setTab('studio')} />
        </div>

        {modal && (
          <div className="absolute inset-0 flex items-center justify-center p-6 z-50" style={{ background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(8px)' }}>
            <div className="rounded-2xl p-5 w-full relative" style={{ background: '#1a2332', border: '1px solid #374151' }}>
              <button onClick={closeModal} className="absolute top-3 right-3 text-stone-500">{I('X', { className: 'w-4 h-4' })}</button>
              <div className="mb-3">
                {I(modal.type === 'tutorial' ? TUTORIALS[modal.key].icon : modal.event.icon, { className: 'w-7 h-7 text-amber-400' })}
              </div>
              <div className="text-stone-100 text-base mb-2" style={{ fontFamily: 'Georgia, serif' }}>
                {modal.type === 'tutorial' ? TUTORIALS[modal.key].title : modal.event.title}
              </div>
              <div className="text-stone-300 text-[12px] leading-relaxed mb-4">
                {modal.type === 'tutorial' ? TUTORIALS[modal.key].body : modal.event.body}
              </div>
              <button onClick={closeModal} className="w-full py-2.5 rounded-lg text-xs font-medium" style={{ background: '#d97706', color: '#fef3c7' }}>
                Ho capito
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function NavBtn({ iconName, label, active, onClick }) {
  return (
    <button onClick={onClick} className="flex-1 py-1.5 flex flex-col items-center gap-0.5 transition-colors">
      {I(iconName, { className: `w-5 h-5 ${active ? 'text-amber-400' : 'text-stone-500'}` })}
      <span className={`text-[9px] tracking-wider uppercase ${active ? 'text-amber-400' : 'text-stone-500'}`}>{label}</span>
    </button>
  );
}

function InvestCard({ label, sub, color, holding, cash, onBuy, onSell, volatile }) {
  const colors = {
    sky: { bg: '#0c4a6e', text: '#bae6fd', accent: '#38bdf8' },
    emerald: { bg: '#064e3b', text: '#a7f3d0', accent: '#34d399' },
    amber: { bg: '#78350f', text: '#fde68a', accent: '#fbbf24' },
  }[color];
  return (
    <div className="rounded-xl p-4" style={{ background: '#111827', border: '1px solid #1f2937' }}>
      <div className="flex justify-between items-start mb-3">
        <div>
          <div className="text-stone-200 text-sm font-medium flex items-center gap-2">
            {label}
            {volatile !== undefined && (
              <span className="text-[9px] font-mono px-1.5 py-0.5 rounded" style={{ background: volatile >= 1 ? '#064e3b' : '#7f1d1d', color: volatile >= 1 ? '#a7f3d0' : '#fecaca' }}>
                {volatile >= 1 ? '+' : ''}{((volatile - 1) * 100).toFixed(0)}%
              </span>
            )}
          </div>
          <div className="text-[10px] text-stone-500">{sub}</div>
        </div>
        <div className="text-right">
          <div className="text-[10px] text-stone-500">Detenuto</div>
          <div className="text-sm" style={{ color: colors.accent }}>{fmt(holding)}</div>
        </div>
      </div>
      <div className="flex gap-2">
        {[100, 1000, 10000].map(a => (
          <button key={a} onClick={() => onBuy(a)} disabled={cash < a}
            className="flex-1 py-1.5 rounded-md text-[10px] font-medium disabled:opacity-25"
            style={{ background: colors.bg, color: colors.text }}>
            +{a >= 1000 ? (a/1000)+'k' : a}
          </button>
        ))}
        <button onClick={() => onSell(Math.min(holding, 1000))} disabled={holding < 1}
          className="px-2 py-1.5 rounded-md text-[10px] font-medium disabled:opacity-25"
          style={{ background: '#374151', color: '#d1d5db' }}>
          Vendi
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CapitalGame />);
